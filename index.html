<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>

<title>Tracker Patrimoine</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" onerror="window._chartJsFailed=true"></script>
<script>
// Fallback si Chart.js non disponible (mode hors ligne / CDN bloqué)
function chartAvailable(){return typeof Chart!=='undefined'&&!window._chartJsFailed;}
function chartFallback(canvasId,datasets,labels){
  const el=byId?.(canvasId);if(!el)return;
  // Support both .chart-inner wrapper and direct parent
  const wrap=el.closest('.chart-inner')||el.parentElement;if(!wrap)return;
  // Remplace le canvas par un tableau de chiffres lisibles
  const rows=datasets.map(d=>{
    const last=d.data?.[d.data.length-1]??null;
    const first=d.data?.[0]??null;
    const delta=last!==null&&first!==null?last-first:null;
    const sign=delta>=0?'+':'';
    return`<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:3px;background:${d.borderColor||'#888'};display:inline-block"></span>${d.label}</span>
      <span><b>${last!==null?fE(last):'—'}</b>${delta!==null?` <span style="font-size:11px;color:${delta>=0?'var(--green)':'var(--red)'}">${sign}${fE(delta)}</span>`:''}</span>
    </div>`;
  }).join('');
  wrap.innerHTML=`<div style="padding:10px 4px">
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">⚠ Graphiques indisponibles hors ligne · Dernières valeurs :</div>
    ${rows||'<span style="color:var(--muted)">Aucune donnée</span>'}
  </div>`;
}
</script>
<style>

.alloc-wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}.donut-wrap{width:155px;height:155px;flex-shrink:0}.legend{flex:1;min-width:130px;display:flex;flex-direction:column;gap:7px}.leg-row{display:grid;grid-template-columns:10px 1fr auto;gap:8px;align-items:center;font-size:13px}.leg-dot{width:10px;height:10px;border-radius:3px}
.tbl-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{padding:11px 13px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;white-space:nowrap}th.l{text-align:left}td{padding:11px 13px;text-align:right;border-top:1px solid var(--border);vertical-align:middle}td.l{text-align:left}tr:hover td{background:var(--surface2)}
.asset-name{font-weight:700}.asset-sub{font-size:11px;color:var(--muted);margin-top:2px}.src-tag{font-size:9px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:2px}.sub-pct{font-size:11px}

.b-gold{background:rgba(232,197,106,.2);color:var(--gold)}.b-crypto{background:rgba(79,157,222,.2);color:var(--blue)}.b-etf{background:rgba(155,140,255,.2);color:var(--violet)}.b-stock{background:rgba(224,164,88,.2);color:var(--orange)}.b-cash,.b-account{background:rgba(125,134,148,.22);color:#aeb6c5}.b-live{background:rgba(67,211,154,.18);color:var(--green)}.b-manual{background:rgba(224,164,88,.18);color:var(--orange)}.b-income{background:rgba(205,183,138,.2);color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}

<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">◆</div><div><div class="brand-name">Patrimoine</div><div class="brand-sub">Cockpit long terme</div></div></div>
    <nav class="nav" id="nav">

// Retourne le statut d'un prix : 'live' <24h, 'recent' <7j, 'stale' >=7j, 'missing' absent
const PRICE_LIVE_MS=864e5,PRICE_STALE_MS=7*864e5;
function priceStatus(sym){
  const pd=S.prices[String(sym||'').toLowerCase()];
  if(!pd||!num(pd.price))return{price:null,status:'missing',label:'Prix manquant',src:'—',at:null};
  const age=pd.at?Date.now()-new Date(pd.at).getTime():Infinity;
  if(age<PRICE_LIVE_MS)return{price:num(pd.price),status:'live',label:'Prix live',src:pd.src||'live',at:pd.at,cur:pd.cur};
  if(age<PRICE_STALE_MS)return{price:num(pd.price),status:'recent',label:'Prix récent',src:pd.src||'manuel',at:pd.at,cur:pd.cur};
  return{price:num(pd.price),status:'stale',label:'Prix daté (>7j)',src:pd.src||'manuel',at:pd.at,cur:pd.cur};
}

function positions(){
  const g={};
  [...S.transactions].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(t=>{
    if(!['buy','sell'].includes(t.op)||!t.sym)return;
    const k=[t.sym.toUpperCase(),inferEnvelope(t),t.platform||''].join('|');
    if(!g[k])g[k]={key:k,name:t.name,sym:t.sym.toUpperCase(),type:t.type,envelope:inferEnvelope(t),platform:t.platform,cur:t.cur,qty:0,costEur:0,boughtQty:0,buyCostEur:0,soldQty:0,salesEur:0,realized:0,feesEur:0,comments:[]};

    x.feesEur+=fees;if(t.comment)x.comments.push(t.comment);
    if(t.op==='buy'){x.qty+=q;x.boughtQty+=q;x.costEur+=gross+fees;x.buyCostEur+=gross+fees;}
    if(t.op==='sell'){const sellQ=Math.min(q,x.qty);if(sellQ<=0)return;const avg=x.qty>0?x.costEur/x.qty:0;const costOut=avg*sellQ;const proceeds=(gross-fees)*(sellQ/q);x.qty-=sellQ;x.costEur-=costOut;x.soldQty+=sellQ;x.salesEur+=proceeds;x.realized+=proceeds-costOut;}
  });
  return Object.values(g).filter(x=>x.qty>1e-10).map(x=>{
    const avgEur=x.qty>0?x.costEur/x.qty:0;
    const avg=fromE(avgEur,x.cur);
    const ps=priceStatus(x.sym);
    const priceCur=ps.cur||S.prices[x.sym.toLowerCase()]?.cur||x.cur;
    // Si prix manquant : val=null, pl=null — on ne ment pas avec le PRU
    const curP=ps.price;
    const val=curP!=null?toE(curP*x.qty,priceCur):null;
    const inv=x.costEur;
    const pl=val!=null?val-inv:null;
    return{...x,avg,curP,priceCur,priceStatus:ps.status,src:ps.src,srcAt:ps.at,inv,

    };
  });
}

function realizedByTx(){const closed={},out={};[...S.transactions].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(t=>{if(!['buy','sell'].includes(t.op)||!t.sym)return;const k=[t.sym.toUpperCase(),inferEnvelope(t),t.platform||''].join('|');if(!closed[k])closed[k]={qty:0,costEur:0};const x=closed[k],q=num(t.qty),gross=toE(q*num(t.price),t.cur),fees=toE(feeTotal(t),t.cur);if(t.op==='buy'){x.qty+=q;x.costEur+=gross+fees;return;}const sellQ=Math.min(q,x.qty);if(sellQ<=0){out[t.id]=0;return;}const avg=x.qty>0?x.costEur/x.qty:0,costOut=avg*sellQ,proceeds=(gross-fees)*(sellQ/q);out[t.id]=proceeds-costOut;x.qty-=sellQ;x.costEur-=costOut;});return out;}
function incomeNet(){return (S.income||[]).reduce((s,i)=>s+toE(num(i.netAmount||num(i.grossAmount)-num(i.tax)),i.cur||'EUR'),0)}
function totals(pos=positions()){
  // passiveVal = AV + PEL + 3e pilier + reserve + comptes courants/CHF (declares, non pilotes)
  const PASSIVE_ACCT_TYPES=new Set(['assurance','pillar','pel','current','chf','reserve','other']);
  // cashPilote = cash sur plateformes d'investissement (Coinbase, TR...)
  const PLATFORM_ACCT_TYPES=new Set(['platform']);
  const accountVal=(S.accounts||[]).reduce((s,a)=>s+accountValue(a),0);
  const passiveVal=(S.accounts||[]).filter(a=>PASSIVE_ACCT_TYPES.has(a.type)).reduce((s,a)=>s+accountValue(a),0);
  const cashPilote=(S.accounts||[]).filter(a=>PLATFORM_ACCT_TYPES.has(a.type)).reduce((s,a)=>s+accountValue(a),0);
  // Positions de marche (ETF, actions, crypto)
  // marketVal : seulement les positions avec un vrai prix (pas PRU)
  const marketVal=pos.reduce((s,p)=>s+(p.valReal??0),0);
  // marketValGross : inclut les positions sans prix (au PRU) pour le patrimoine total affiché
  const marketValGross=pos.reduce((s,p)=>s+p.val,0);
  const marketInv=pos.reduce((s,p)=>s+p.inv,0);
  const unrealized=pos.reduce((s,p)=>s+p.pl,0);
  // Nombre de positions sans prix fiable
  const missingPrices=pos.filter(p=>p.stalePRU).length;
  const totalPositions=pos.length;
  const realized=realizedTotals();
  const inc=incomeNet();
  const perf=unrealized+realized+inc;
  const totalVal=marketVal+accountVal;
  const totalVal2=marketValGross+accountVal;
  return{
    marketVal,marketValGross,marketInv,unrealized,realized,income:inc,perf,
    perfPct:marketInv>0?perf/marketInv*100:0,
    val:totalVal2,accountVal,passiveVal,cashPilote,
    missingPrices,totalPositions,
    // compat legacy
    riskyVal:marketVal,riskyInv:marketInv,
    inv:marketInv,accountInvested:0,
    positions:pos.length,accounts:(S.accounts||[]).length
  };
}

function createSnapshot(manual){

  // Qualité des prix au moment du snapshot
  const priceQuality=pos.reduce((m,p)=>{m[p.sym]={status:p.priceStatus,at:p.srcAt,src:p.src};return m;},{});
  const pricedPositions=pos.filter(p=>!p.stalePRU).length;
  const snap={id:cid(),date:new Date().toISOString(),manual:!!manual,
    total:T.val,invested:T.marketInv,
    marketVal:T.marketVal,        // valeur avec vrais prix seulement
    marketValGross:T.marketValGross, // valeur incluant PRU pour positions sans prix
    passiveVal:T.passiveVal,cashPilote:T.cashPilote,
    unrealized:T.unrealized,realized:T.realized,income:T.income,performance:T.perf,
    allocation:types,envelopes:env,
    priceQuality,
    pricedPositions,totalPositions:pos.length,
    // flag fiabilité : 'full' tous pricés, 'partial' certains au PRU, 'none' aucun
    reliability:pos.length===0?'none':pricedPositions===pos.length?'full':pricedPositions>0?'partial':'none'
  };
  if(todayIdx>=0){
    // Un seul snapshot par jour : on remplace celui du jour par le plus récent
    snaps[todayIdx]=snap;
  }else{
    snaps.push(snap);
  }

  save();
  if(manual)toast('Snapshot du jour mis à jour');

function histRangeLabel(){

  if(activePeriod==='custom'){
    return `Du ${S.histFrom||'…'} au ${S.histTo||"aujourd'hui"}`;
  }
  const {from}=histRange();

// Reconstruit le capital injecté jour par jour depuis les transactions réelles
// Retourne [{date: 'YYYY-MM-DD', cumul: €}] trié chronologiquement
// Inclus uniquement les actifs de marché (type ETF, actions, crypto, gold physique via transactions)
function capitalInjecteParDate(){
  const MARKET_TYPES=new Set(['etf','stock','crypto','gold']);
  const txs=[...S.transactions]
    .filter(t=>['buy','sell'].includes(t.op)&&t.sym&&t.date)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(!txs.length)return[];
  // Cumul des flux nets (achats positifs, ventes récupèrent le capital)
  // On garde un suivi position par position pour ventes FIFO
  const positions={};
  const events=[];
  txs.forEach(t=>{
    const type=t.type||(assetCatalog()[String(t.sym||'').toUpperCase()]?.type)||'other';
    if(!MARKET_TYPES.has(type))return;
    const k=[String(t.sym||'').toUpperCase(),t.envelope||'',t.platform||''].join('|');
    if(!positions[k])positions[k]={qty:0,cost:0};
    const p=positions[k];
    const gross=toE(num(t.qty)*num(t.price),t.cur);
    const fees=toE(feeTotal(t),t.cur);
    const date=(t.date||'').slice(0,10);
    if(t.op==='buy'){
      const inject=gross+fees;
      p.qty+=num(t.qty);p.cost+=inject;
      events.push({date,delta:+inject});
    }else if(t.op==='sell'){
      // Vente : on rembourse le coût moyen (pas les gains) → capital injecté diminue
      const sq=Math.min(num(t.qty),p.qty);
      if(sq<=0)return;
      const avg=p.qty>0?p.cost/p.qty:0;
      const costReturned=avg*sq;
      p.qty-=sq;p.cost-=costReturned;
      events.push({date,delta:-costReturned});
    }
  });
  if(!events.length)return[];
  // Agréger par date
  const byDate={};
  events.forEach(({date,delta})=>byDate[date]=(byDate[date]||0)+delta);
  const dates=Object.keys(byDate).sort();
  let cumul=0;
  return dates.map(date=>{cumul+=byDate[date];return{date,cumul};});
}
function prixFiabilite(pos_arg){
  const pos=pos_arg||positions();
  const total=pos.length;
  if(!total)return{total:0,live:0,recent:0,stale:0,missing:0,score:100,label:'Aucune position',color:'var(--muted)',ok:true};
  const byStatus={live:0,recent:0,stale:0,missing:0};
  pos.forEach(p=>byStatus[p.priceStatus]=(byStatus[p.priceStatus]||0)+1);
  const fiables=byStatus.live+byStatus.recent;
  const score=Math.round(fiables/total*100);
  const color=score===100?'var(--green)':score>=70?'var(--amber,#e0a458)':'var(--red)';
  const issues=[];
  if(byStatus.missing)issues.push(`${byStatus.missing} manquant${byStatus.missing>1?'s':''}`);
  if(byStatus.stale)issues.push(`${byStatus.stale} daté${byStatus.stale>1?'s':''} (>7j)`);
  const label=issues.length?issues.join(' · '):'Tous les prix à jour';
  return{total,fiables,...byStatus,score,label,color,ok:fiables===total,
    missing_syms:pos.filter(p=>p.priceStatus==='missing').map(p=>p.sym),
    stale_syms:pos.filter(p=>p.priceStatus==='stale').map(p=>p.sym)};
}

function drawHistoryChart(){
  const {from,to}=histRange();
  let snaps=[...(S.snapshots||[])].filter(s=>{
    const d=new Date(s.date);
    return !(from&&d<from)&&!(to&&d>to);
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const grid=dark?'rgba(36,40,51,1)':'rgba(230,230,223,1)';
  const muted=dark?'#888fa0':'#71757e';

  // Helpers
  const fmtDate=d=>new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  const fmtTime=d=>new Date(d).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const snapLabels=snaps.map(s=>{
    const days=new Set(snaps.map(x=>(x.date||'').slice(0,10)));
    return days.size<=1?fmtTime(s.date):fmtDate(s.date);
  });
  const pr=snaps.length<20?3:0;

  const baseOpts=(legendDisplay,extraScaleY)=>({
    responsive:true,maintainAspectRatio:false,
    interaction:{intersect:false,mode:'index'},
    plugins:{
      legend:{display:legendDisplay,position:'bottom',labels:{color:muted,font:{size:11},boxWidth:12,padding:14,usePointStyle:true,pointStyleWidth:10}},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fE(c.parsed.y)}`}}
    },
    scales:{
      x:{grid:{display:false},ticks:{color:muted,maxTicksLimit:8,font:{size:10}}},
      y:{...( extraScaleY||{}),grid:{color:grid},ticks:{color:muted,maxTicksLimit:6,font:{size:10},callback:v=>v>=1000?`${Math.round(v/1000)}k`:Math.round(v)}}
    }
  });

  const noData=msg=>`<div class="chart-empty">${msg}</div>`;
  const setInner=(id,html)=>{const el=byId(id);if(el)(el.closest('.chart-inner')||el.parentElement).innerHTML=html;};

  // ── A. Capital injecté (transactions uniquement — escalier exact) ─────────
  const elCap=byId('hist-capital');
  if(elCap){
    let cap=capitalInjecteParDate();
    if(from)cap=cap.filter(c=>new Date(c.date)>=from);
    if(to)cap=cap.filter(c=>new Date(c.date)<=to);
    if(cap.length<1){
      setInner('hist-capital',noData('Aucune transaction de marché enregistrée.'));
    } else {
      // Étendre jusqu\'à aujourd\'hui
      const todayStr=new Date().toISOString().slice(0,10);
      if(cap[cap.length-1].date<todayStr)cap=[...cap,{date:todayStr,cumul:cap[cap.length-1].cumul}];
      const capLabels=cap.map(c=>fmtDate(c.date));
      const dsCap=[{
        label:'Capital injecté (achats, frais inclus · ventes au coût moyen)',
        data:cap.map(c=>c.cumul),
        borderColor:'#4f9dde',backgroundColor:'rgba(79,157,222,0.08)',
        fill:true,stepped:'before',tension:0,
        pointRadius:cap.length<=40?2:0,pointHoverRadius:5,borderWidth:2
      }];
      if(!chartAvailable())chartFallback('hist-capital',dsCap,capLabels);
      else charts.push(new Chart(elCap.getContext('2d'),{type:'line',data:{labels:capLabels,datasets:dsCap},options:baseOpts(false)}));
    }
  }

  // ── B. Valeur marché vs Capital investi — même axe X (dates snapshots) ────
  // + indicateur fiabilité par point
  const elVal=byId('hist-valeur');
  if(elVal){
    if(snaps.length<2){
      setInner('hist-valeur',noData('Pas assez de snapshots — crée-en un maintenant, puis un autre plus tard.'));
    } else {
      // Capital injecté interpolé aux dates des snapshots (valeur au moment du snap)
      const capAll=capitalInjecteParDate();
      const capMap=Object.fromEntries(capAll.map(c=>[c.date,c.cumul]));
      // Propagation forward pour chaque date snapshot
      let lastCap=0;
      const snapCap=snaps.map(s=>{
        const d=(s.date||'').slice(0,10);
        // Trouver le dernier cumul <= cette date
        const match=capAll.filter(c=>c.date<=d);
        if(match.length)lastCap=match[match.length-1].cumul;
        return lastCap||null;
      });

      // Valeur marché : utiliser marketVal (vrais prix) si dispo, sinon null
      const marketVals=snaps.map(s=>s.marketVal!=null&&s.marketVal>0?s.marketVal:null);
      // Fiabilité par snapshot
      const reliability=snaps.map(s=>s.reliability||'unknown');

      const dsVal=[
        {label:'Valeur marché (prix réels)',
         data:marketVals,
         borderColor:'#9b8cff',backgroundColor:'rgba(155,140,255,0.08)',
         fill:true,tension:.35,pointRadius:pr,pointHoverRadius:6,borderWidth:2.5,
         spanGaps:false,  // ne pas relier les trous — montre l\'absence de prix
         segment:{borderColor:ctx=>{
           // Colore en ambre les segments où la fiabilité est partielle
           const i=ctx.p0DataIndex;
           return reliability[i]==='partial'?'#e0a458':reliability[i]==='none'?'#e05858':undefined;
         }}
        },
        {label:'Capital injecté (réf.)',
         data:snapCap,
         borderColor:'#4f9dde',backgroundColor:'transparent',
         fill:false,tension:0,stepped:'before',
         pointRadius:0,borderWidth:1.5,borderDash:[3,3],
         spanGaps:true
        },
      ].filter(d=>d.data.some(v=>v!=null&&v>0));

      if(!chartAvailable())chartFallback('hist-valeur',dsVal,snapLabels);
      else charts.push(new Chart(elVal.getContext('2d'),{type:'line',data:{labels:snapLabels,datasets:dsVal},options:baseOpts(true)}));
    }
  }

  // ── C. Gain / Perte latent — courbe autour de zéro ───────────────────────
  const elPl=byId('hist-pl');
  if(elPl){
    if(snaps.length<2){
      setInner('hist-pl',noData('Pas assez de snapshots.'));
    } else {
      const capAll2=capitalInjecteParDate();
      let lastCap2=0;
      const snapPl=snaps.map(s=>{
        const d=(s.date||'').slice(0,10);
        const match=capAll2.filter(c=>c.date<=d);
        if(match.length)lastCap2=match[match.length-1].cumul;
        const mv=s.marketVal!=null&&s.marketVal>0?s.marketVal:null;
        return mv!=null&&lastCap2>0?mv-lastCap2:null;
      });
      const hasData=snapPl.some(v=>v!=null);
      if(!hasData){
        setInner('hist-pl',noData('Aucune valeur marché disponible dans les snapshots. Mets à jour les prix et crée un snapshot.'));
      } else {
        // Dataset avec couleur dynamique : vert si positif, rouge si négatif
        const dsPl=[{
          label:'Plus-value latente',
          data:snapPl,
          borderColor:'#43d39a',  // sera overridé par segment
          backgroundColor:'rgba(67,211,154,0.08)',
          fill:{target:'origin'},  // remplir depuis zéro
          tension:.35,pointRadius:pr,pointHoverRadius:6,borderWidth:2,
          spanGaps:false,
          segment:{
            borderColor:ctx=>ctx.p0.parsed.y>=0?'#43d39a':'#e05858',
            backgroundColor:ctx=>ctx.p0.parsed.y>=0?'rgba(67,211,154,0.08)':'rgba(224,88,88,0.08)'
          }
        }];
        const plOpts=baseOpts(false);
        // Ligne zéro visible
        plOpts.plugins.annotation={annotations:{zero:{type:'line',yMin:0,yMax:0,borderColor:muted,borderWidth:1,borderDash:[2,2]}}};
        if(!chartAvailable())chartFallback('hist-pl',dsPl,snapLabels);
        else charts.push(new Chart(elPl.getContext('2d'),{type:'line',data:{labels:snapLabels,datasets:dsPl},options:plOpts}));
      }
    }
  }

  // ── D. Par catégorie (snapshots) ──────────────────────────────────────────
  const el4=byId('hist-categories');if(!el4)return;
  if(snaps.length<2){setInner('hist-categories',noData('Pas assez de données.'));return;}
  const hasAlloc=snaps.some(s=>s.allocation&&Object.keys(s.allocation).length>0);
  if(!hasAlloc){setInner('hist-categories',noData('Données par catégorie disponibles au prochain snapshot.'));return;}
  const catDefs=[
    {key:'etf',label:'ETF',color:'#9b8cff',bg:'rgba(155,140,255,0.10)'},
    {key:'crypto',label:'Crypto',color:'#4f9dde',bg:'rgba(79,157,222,0.10)'},
    {key:'stock',label:'Actions',color:'#e0a458',bg:'rgba(224,164,88,0.10)'},
    {key:'gold',label:'Or',color:'#e8c56a',bg:'rgba(232,197,106,0.08)'},
  ];
  const activeCats=catDefs.filter(c=>snaps.some(s=>s.allocation&&(s.allocation[c.key]||0)>0));
  if(!activeCats.length){setInner('hist-categories',noData('Aucune donnée de catégorie.'));return;}
  const ds4=activeCats.map(c=>({label:c.label,data:snaps.map(s=>((s.allocation||{})[c.key])||0),borderColor:c.color,backgroundColor:c.bg,fill:false,tension:.35,pointRadius:pr,pointHoverRadius:5,borderWidth:2}));
  if(!chartAvailable()){chartFallback('hist-categories',ds4,snapLabels);return;}
  charts.push(new Chart(el4.getContext('2d'),{type:'line',data:{labels:snapLabels,datasets:ds4},options:baseOpts(true)}));
}

function acSearch(val){const list=byId('ac-list');if(!list||!val){list.style.display='none';return;}const q=val.toUpperCase(),cat=assetCatalog();const matches=Object.entries(cat).filter(([k,v])=>k.includes(q)||String(v.name).toUpperCase().includes(q)).slice(0,9);if(!matches.length){list.innerHTML=`<div class="ac-item"><div><div class="ac-name">Actif personnalisé possible</div><div class="ac-type">Ajoute-le dans Portefeuille si tu veux le réutiliser</div></div></div>`;list.style.display='block';return;}list.innerHTML=matches.map(([k,v])=>`<div class="ac-item" onmousedown="acSelect('${k}')"><div><div class="ac-name">${k} — ${esc(v.name)}</div><div class="ac-type">${TYPES[v.type]||v.type} · ${v.cur}</div></div><span class="badge b-${v.type}">${TYPES[v.type]||v.type}</span></div>`).join('');list.style.display='block';}
function acSelect(sym){const i=assetCatalog()[sym];byId('fs').value=sym;byId('fn').value=i.name;byId('ft').value=i.type;byId('fc').value=i.cur||'EUR';const env=inferEnvelope({type:i.type,platform:byId('fp')?.value||''});if(byId('fe'))byId('fe').value=env;byId('ac-list').style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('.autocomplete-wrap')){['ac-list','dac-list'].forEach(id=>{const l=byId(id);if(l)l.style.display='none';});}});
function saveTx(){const sym=byId('fs').value.trim().toUpperCase(),name=byId('fn').value.trim(),qty=num(byId('fq').value),price=num(byId('fpr').value);if(!sym||!name||qty<=0||price<=0){toast('Ticker, nom, quantité et prix requis');return;}const editId=byId('f-edit-id')?.value||null;let tx={id:editId||cid(),date:byId('fd').value||today(),name,sym,type:byId('ft').value,envelope:byId('fe').value,platform:byId('fp').value.trim(),cur:byId('fc').value,op:byId('fo').value,qty,price,fees:num(byId('ff').value),fxFees:num(byId('ffx').value),spreadFees:num(byId('fsp').value),brokerFees:num(byId('fbr').value),goldWeight:num(byId('fgw').value),goldKind:byId('fgk').value,spotPrice:num(byId('fgs').value),comment:byId('fco').value.trim()};if(tx.op==='sell'){const preview=salePreview(tx);if(preview.error){toast(preview.error);return;}tx.realizedPl=preview.realized;tx.proceeds=preview.proceeds;tx.avgCost=preview.avgCost;}if(editId){S.transactions=S.transactions.map(t=>t.id===editId?tx:t);toast('Transaction modifiée');}else{S.transactions.push(tx);toast(tx.op==='sell'?'Vente enregistrée':'Transaction ajoutée');}if(!S.prices[sym.toLowerCase()])S.prices[sym.toLowerCase()]={price,cur:tx.cur,src:'manuel',at:new Date().toISOString()};save();renderTransactions();renderSpotBar();}
function salePreview(tx){
  const editId=tx._editId||tx.id||null;
  let qty=0,cost=0;
  [...S.transactions]
    .filter(t=>!editId||t.id!==editId) // exclure l'ancienne version lors d'une édition
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''))
    .forEach(t=>{
      if((t.date||'')>(tx.date||'9999-12-31'))return;
      if(t.sym!==tx.sym||inferEnvelope(t)!==tx.envelope||t.platform!==tx.platform)return;
      const q=num(t.qty),gross=toE(q*num(t.price),t.cur),fees=toE(feeTotal(t),t.cur);
      if(t.op==='buy'){qty+=q;cost+=gross+fees}
      else if(t.op==='sell'){const sq=Math.min(q,qty);if(sq<=0)return;const avg=qty?cost/qty:0;qty-=sq;cost-=avg*sq;}
    });
  if(tx.qty>qty+1e-10)return{error:'Quantité vendue supérieure à la position disponible'};
  const avg=qty?cost/qty:0,proceeds=toE(tx.qty*tx.price,tx.cur)-toE(feeTotal(tx),tx.cur),realized=proceeds-avg*tx.qty;
  return{avgCost:avg,proceeds,realized};
}

function myMarketItems(){
  const pos=positions(),cat=assetCatalog();

  const peaPos=pos.filter(p=>p.envelope==='PEA'||p.type==='etf');
  const etfBase=peaPos.map(p=>({label:p.name,sym:p.sym,localSym:p.sym,kind:'etf',cur:p.cur||'EUR'}));
  const hasSym=s=>etfBase.some(e=>e.sym===s);
  const etf=uniqueMarketItems([
    ...etfBase,
    ...(!hasSym('AO00')&&!hasSym('WPEA')?[{label:'MSCI World iShares Swap PEA',sym:'AO00',localSym:'AO00',kind:'etf',cur:'EUR'}]:[]),
    ...(!hasSym('ESEE')?[{label:'S&P 500 BNP Easy PEA',sym:'ESEE',localSym:'ESEE',kind:'etf',cur:'EUR'}]:[])
  ]);
  const stocks=uniqueMarketItems(
    pos.filter(p=>p.type==='stock')
       .map(p=>({label:p.name,sym:p.sym,localSym:p.sym,kind:'stock',cur:p.cur||'USD'}))
  );
  const CG={BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',XRP:'ripple',ADA:'cardano',LINK:'chainlink',DOT:'polkadot',AVAX:'avalanche-2',MATIC:'matic-network',UNI:'uniswap',LTC:'litecoin'};
  const crypto=uniqueMarketItems([
    {label:'Bitcoin', sym:'BTC',cgId:'bitcoin', localSym:'BTC',kind:'crypto',cur:'EUR'},
    {label:'Ethereum',sym:'ETH',cgId:'ethereum',localSym:'ETH',kind:'crypto',cur:'EUR'},
    ...pos.filter(p=>p.type==='crypto'&&CG[p.sym]&&!['BTC','ETH'].includes(p.sym))
        .map(p=>({label:p.name,sym:p.sym,cgId:CG[p.sym],localSym:p.sym,kind:'crypto',cur:'EUR'}))
  ]);
  const goldMacro=[
    {label:'Or / once', sym:'XAU',cgId:'pax-gold',localSym:'XAU',kind:'crypto',cur:'EUR'}
  ];
  return[
    {section:'ETF PEA',items:etf},
    ...(stocks.length?[{section:'Actions CTO',items:stocks}]:[]),
    {section:'Crypto (live)',items:crypto},
    {section:'Or (live)',items:goldMacro}

function showDcaForm(){byId('dca-form').innerHTML=`<div class="card"><div class="card-title">Nouvelle ligne mensuelle</div><div style="display:flex;gap:10px;margin-bottom:10px"><div class="fl" style="flex:1"><label>Ticker</label><div class="autocomplete-wrap"><input id="ds" style="text-transform:uppercase;width:100%" oninput="dcaAcSearch(this.value)" autocomplete="off" placeholder="Ex: AO00, ESEE, BTC…"><div class="autocomplete-list" id="dac-list" style="display:none"></div></div></div><div class="fl" style="flex:2"><label>Nom</label><input id="dn" placeholder="Rempli automatiquement"></div></div><div class="fgrid" style="overflow:visible"><div class="fl"><label>Type</label><select id="dt">${Object.entries(TYPES).filter(([k])=>['etf','stock','crypto'].includes(k)).map(([k,l])=>`<option value="${k}">${l}</option>`).join('')}</select></div><div class="fl"><label>Montant prévu</label><input id="da" type="number"></div><div class="fl"><label>Fréquence</label><select id="df"><option>Mensuelle</option><option>Trimestrielle</option><option>Hebdomadaire</option></select></div><div class="fl"><label>Plateforme</label><select id="dp">${PLATFORMS.map(pf=>`<option>${pf}</option>`).join('')}</select></div><div class="fl"><label>Devise</label><select id="dc"><option>EUR</option><option>USD</option><option>CHF</option></select></div><div class="fl"><label>Jour du mois</label><input id="dd" type="number" value="5"></div><div class="fl"><label>Enveloppe</label><select id="de">${DCA_ENVELOPES.map(e=>`<option>${e}</option>`).join('')}</select></div></div><div class="fa"><button class="btn btn-p" onclick="saveDcaLine()">Enregistrer</button><button class="btn btn-g" onclick="byId('dca-form').innerHTML=''">Annuler</button></div></div>`}
function dcaAcSearch(val){const list=byId('dac-list');if(!list||!val){if(list)list.style.display='none';return;}const q=val.toUpperCase(),cat=assetCatalog();const matches=Object.entries(cat).filter(([k,v])=>k.includes(q)||String(v.name).toUpperCase().includes(q)).slice(0,9);if(!matches.length){list.style.display='none';return;}list.innerHTML=matches.map(([k,v])=>`<div class="ac-item" onmousedown="dcaAcSelect('${k}')"><div><div class="ac-name">${k} — ${esc(v.name)}</div><div class="ac-type">${TYPES[v.type]||v.type} · ${v.cur}</div></div><span class="badge b-${v.type}">${TYPES[v.type]||v.type}</span></div>`).join('');list.style.display='block';}
function dcaAcSelect(sym){const i=assetCatalog()[sym];byId('ds').value=sym;if(byId('dn'))byId('dn').value=i.name;if(byId('dt')&&['etf','stock','crypto'].includes(i.type))byId('dt').value=i.type;if(byId('dc'))byId('dc').value=i.cur||'EUR';if(byId('dp')&&i.platform)byId('dp').value=i.platform;if(byId('de'))byId('de').value=inferEnvelope({type:i.type,platform:i.platform});byId('dac-list').style.display='none';}
function saveDcaLine(){const l={id:cid(),name:byId('dn').value.trim(),sym:byId('ds').value.trim().toUpperCase(),type:byId('dt').value,plannedAmt:num(byId('da').value),frequency:byId('df').value,platform:byId('dp').value.trim(),cur:byId('dc').value,day:num(byId('dd').value),envelope:byId('de').value,active:true};if(!l.name||!l.sym||l.plannedAmt<=0){toast('Nom, ticker et montant requis');return;}if(!DCA_ENVELOPES.includes(l.envelope)){toast('Cette enveloppe est hors plan mensuel');return;}S.dca.lines=[...(S.dca.lines||[]),l];save();renderDca();}
function executeDca(id){
  const l=S.dca.lines.find(x=>x.id===id),mk=monthNow();if(!l)return;
  const existing=(S.dca.executions||[]).find(e=>e.month===mk&&e.lineId===id);
  if(existing){
    if(!confirm('Retirer le statut exécuté de cette ligne ?'))return;
    if(existing.txId&&confirm('Retirer aussi la transaction créée automatiquement ?'))S.transactions=S.transactions.filter(t=>t.id!==existing.txId);
    S.dca.executions=S.dca.executions.filter(e=>e.id!==existing.id);
    save();renderDca();toast('Exécution DCA retirée');return;
  }
  const actual=num(prompt('Montant brut réellement investi',l.plannedAmt));if(actual<=0)return;
  let txId=null,fees=0,spreadFees=0,qty=0,price=0;
  if(confirm('Créer automatiquement une transaction d’achat ?')){
    price=priceFor(l.sym,0,l.cur);price=num(prompt('Prix unitaire exécuté',price||0));
    if(price<=0){toast('Prix requis pour créer la transaction');return;}
    fees=num(prompt('Frais d’ordre',0));
    spreadFees=num(prompt('Spread / frais estimés',0));
    const defaultQty=Math.max(0,actual-fees-spreadFees)/price;
    qty=num(prompt('Quantité réellement achetée',defaultQty.toFixed(8)));
    if(qty<=0){toast('Quantité requise pour créer la transaction');return;}
    const tx={id:cid(),date:today(),name:l.name,sym:l.sym,type:l.type,envelope:l.envelope,platform:l.platform,cur:l.cur,op:'buy',qty,price,fees,spreadFees,comment:'Créé depuis le plan mensuel'};
    S.transactions.push(tx);txId=tx.id;
  }
  S.dca.executions=[...(S.dca.executions||[]),{id:cid(),lineId:id,month:mk,date:today(),name:l.name,planned:num(l.plannedAmt),actual,fees,spreadFees,qty,price,txId}];
  save();toast('Plan mensuel exécuté');renderDca();
}
function delDcaLine(id){if(!confirm('Supprimer cette ligne DCA ?'))return;S.dca.lines=S.dca.lines.filter(l=>l.id!==id);save();renderDca();}
function renderAllocation(){const items=strategyItems(),baseValue=sumItems(items);function valFor(t){if(t.matchType==='symbol')return items.filter(i=>i.sym===String(t.matchValue).toUpperCase()).reduce((s,i)=>s+i.value,0);if(t.matchType==='type')return items.filter(i=>i.type===t.matchValue).reduce((s,i)=>s+i.value,0);if(t.matchType==='envelope')return items.filter(i=>i.envelope===t.matchValue).reduce((s,i)=>s+i.value,0);return 0}killCharts();byId('content').innerHTML=`<div class="stack"><div class="toolbar"><div class="hint">Simulation indicative basée sur tes cibles. Base utilisée: portefeuille piloté (${fE(baseValue)}) = PEA, CTO, crypto et cash disponible. Assurance-vie, 3e pilier et PEL gelés sont exclus.</div><button class="btn btn-p" onclick="addTarget()">Ajouter cible</button></div><div class="g2" id="alloc-donuts" style="margin-bottom:14px"></div><div class="card flush"><div class="tbl-wrap"><table><thead><tr><th class="l">Cible</th><th class="l">Règle</th><th>Actuel</th><th>Cible</th><th>Écart €</th><th>Écart %</th><th class="l">Recommandation mécanique</th><th></th></tr></thead><tbody>${(S.targetAllocation||[]).map(t=>{const v=valFor(t),cur=baseValue?v/baseValue*100:0,target=num(t.targetPct),targetE=baseValue*target/100,diff=targetE-v,rec=Math.abs(diff)<50?'Ne rien faire':diff>0?`Acheter / renforcer ${esc(t.label)} pour environ ${fE(diff)}`:`Ne pas renforcer ${esc(t.label)} ce mois-ci`;return`<tr><td class="l"><input class="mini-input" value="${esc(t.label)}" onchange="editTarget('${t.id}','label',this.value)"></td><td class="l"><select class="mini-input" onchange="editTarget('${t.id}','matchType',this.value)"><option value="symbol" ${t.matchType==='symbol'?'selected':''}>Ticker</option><option value="type" ${t.matchType==='type'?'selected':''}>Type</option><option value="envelope" ${t.matchType==='envelope'?'selected':''}>Enveloppe</option></select><input class="mini-input" value="${esc(t.matchValue)}" onchange="editTarget('${t.id}','matchValue',this.value)" style="margin-top:5px"></td><td>${cur.toFixed(1)}%</td><td><input class="mini-input" type="number" value="${target}" onchange="editTarget('${t.id}','targetPct',this.value)"></td><td class="${diff>=0?'pos':'neg'}">${fE(diff)}</td><td class="${target-cur>=0?'pos':'neg'}">${(target-cur).toFixed(1)} pts</td><td class="l">${rec}</td><td><button class="icon-btn" onclick="delTarget('${t.id}')">×</button></td></tr>`}).join('')}</tbody></table></div></div></div>`;
  const targets=(S.targetAllocation||[]).filter(t=>num(t.targetPct)>0);
  if(targets.length&&baseValue>0){
    const PALETTE=['#9b8cff','#e0a458','#4f9dde','#43d39a','#e8c56a','#d4537e','#7dd3fc','#a1a1aa','#97c459','#f0997b'];
    const labels=targets.map(t=>t.label);
    const actualData=targets.map(t=>valFor(t));
    const otherActual=Math.max(0,baseValue-actualData.reduce((s,v)=>s+v,0));
    const targetData=targets.map(t=>baseValue*num(t.targetPct)/100);
    const otherTarget=Math.max(0,baseValue-targetData.reduce((s,v)=>s+v,0));
    const dn=byId('alloc-donuts');
    if(dn){dn.innerHTML=`
      <div class="card"><div class="card-title">Allocation actuelle</div><div class="donut-wrap" style="max-width:220px;margin:0 auto"><canvas id="alloc-actual"></canvas></div></div>
      <div class="card"><div class="card-title">Allocation cible</div><div class="donut-wrap" style="max-width:220px;margin:0 auto"><canvas id="alloc-target"></canvas></div></div>`;
    const mk=(id,data,extra)=>{const el=byId(id);if(!el)return;charts.push(new Chart(el.getContext('2d'),{type:'doughnut',data:{labels:[...labels,'Reste'],datasets:[{data:[...data,extra],backgroundColor:[...labels.map((_,i)=>PALETTE[i%PALETTE.length]),'#3a3f4b'],borderWidth:0}]},options:{cutout:'60%',plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:10,font:{size:10}}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fE0(ctx.parsed)} (${(ctx.parsed/baseValue*100).toFixed(1)}%)`}}}}}));};
    mk('alloc-actual',actualData,otherActual);
    mk('alloc-target',targetData,otherTarget);}
  }
}
function editTarget(id,k,v){const t=S.targetAllocation.find(x=>x.id===id);if(t){t[k]=k==='targetPct'?num(v):v;if(k==='matchValue')t[k]=String(v).trim();save();}}
function addTarget(){S.targetAllocation=[...(S.targetAllocation||[]),{id:cid(),label:'Nouvelle cible',matchType:'type',matchValue:'etf',targetPct:0}];save();renderAllocation();}

function renderGoals(){
  const T=totals(),g=S.goals,rate=num(g.annualReturn),monthly=num(g.monthlyInvestment);
  // Projection : capital actuel + apport mensuel avec rendement
  function proj(y){const r=rate/100/12,n=y*12;return T.val*Math.pow(1+r,n)+(r?monthly*((Math.pow(1+r,n)-1)/r):monthly*n)}
  // Mensuel SUPPLÉMENTAIRE nécessaire pour atteindre target en y ans, PAR RAPPORT à la projection actuelle
  // Si proj(y) >= target => 0
  // Sinon : on cherche x tel que proj_avec_monthly+x(y) = target
  // gap = target - T.val*(1+r)^n; needed_monthly = gap*r/((1+r)^n-1); extra = needed_monthly - monthly
  function extraNeeded(target,y){
    const want=num(target),pj=proj(y);
    if(pj>=want||want<=0)return 0;
    const r=rate/100/12,n=y*12,fv=T.val*Math.pow(1+r,n);
    const gap=want-fv;
    const totalMonthly=r?gap*r/(Math.pow(1+r,n)-1):gap/n;
    return Math.max(0,totalMonthly-monthly);
  }
  const pct=num(g.targetTotal)>0?clamp(T.val/num(g.targetTotal)*100,0,100):0;
  byId('content').innerHTML=`<div class="stack">
    <div class="g4">
      <div class="card kpi-card"><div class="kpi-lbl">Mon patrimoine aujourd'hui</div><div class="kpi-val">${fE(T.val)}</div></div>
      <div class="card kpi-card">
        <div class="kpi-lbl">Objectif final</div>
        <input type="number" value="${g.targetTotal}" onchange="S.goals.targetTotal=num(this.value);save();renderGoals()">
        <div class="progress"><span style="width:${pct}%"></span></div>
        <div class="hint" style="margin-top:6px">${pct.toFixed(1)} % atteint</div>
      </div>
      <div class="card kpi-card">
        <div class="kpi-lbl">J'investis chaque mois</div>
        <input type="number" value="${monthly}" onchange="S.goals.monthlyInvestment=num(this.value);save();renderGoals()">
      </div>
      <div class="card kpi-card">
        <div class="kpi-lbl">Rendement annuel estimé (%)</div>
        <input type="number" value="${rate}" onchange="S.goals.annualReturn=num(this.value);save();renderGoals()">
      </div>
    </div>
    <div class="card">
      <div class="toolbar"><div>
        <div class="card-title" style="margin:0">Projection sur 20 ans</div>
        <div class="hint">Si tu continues à investir ${fE0(monthly)}/mois avec ${rate} %/an de rendement moyen.</div>
      </div></div>
      <div class="chart-wrap"><canvas id="goals-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Mes objectifs par échéance</div>
      <p class="hint">Saisis le montant que tu veux avoir à chaque date. L'app te dit si tu vas l'atteindre avec ton rythme actuel, et combien il faudrait ajouter par mois si non.</p>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th class="l">Échéance</th>
          <th>Ma projection</th>
          <th>Mon objectif</th>
          <th>Résultat</th>
          <th>Mensuel à ajouter</th>
        </tr></thead>
        <tbody>${[1,5,10,20].map(y=>{
          const target=num(g.horizonTargets?.[y]);
          const pj=Math.round(proj(y));
          const extra=extraNeeded(target,y);
          const ok=target>0&&pj>=target;
          const noTarget=target<=0;
          return`<tr>
            <td class="l"><b>${y} an${y>1?'s':''}</b></td>
            <td>${fE0(pj)}</td>
            <td><input class="mini-input" type="number" value="${target||''}" placeholder="Fixe un objectif" onchange="S.goals.horizonTargets=S.goals.horizonTargets||{};S.goals.horizonTargets['${y}']=num(this.value);save();renderGoals()"></td>
            <td>${noTarget?'<span class="muted">—</span>':ok?'<span class="pos">✓ objectif atteint</span>':'<span class="neg">✗ insuffisant</span>'}</td>
            <td>${noTarget||ok?'<span class="muted">0 €</span>':('<b>+'+fE0(extra)+'</b>/mois')}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
  </div>`;
  killCharts();
  const el=byId('goals-chart');
  if(el){
    const years=[];for(let y=0;y<=20;y++)years.push(y);
    const projData=years.map(y=>Math.round(proj(y)));
    const investedData=years.map(y=>Math.round(T.val+monthly*12*y));
    const targetTotal=num(g.targetTotal);
    // Année où la projection atteint l'objectif
    let crossYear=-1;
    if(targetTotal>0){for(let y=0;y<=20;y++){if(proj(y)>=targetTotal){crossYear=y;break;}}}
    const crossData=years.map(y=>y===crossYear?targetTotal:null);
    const dark=document.documentElement.getAttribute('data-theme')==='dark';
    const muted=dark?'#8b93a4':'#71757e',grid=dark?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)';
    charts.push(new Chart(el.getContext('2d'),{
      type:'line',
      data:{labels:years.map(y=>y===0?'Auj.':(y+' an'+(y>1?'s':''))),datasets:[
        {label:'Projection (avec rendement)',data:projData,borderColor:'#cdb78a',backgroundColor:'rgba(205,183,138,.12)',fill:true,tension:.3,pointRadius:0,borderWidth:2.5},
        {label:'Capital investi (sans rendement)',data:investedData,borderColor:'#4f9dde',backgroundColor:'transparent',fill:false,tension:.3,pointRadius:0,borderWidth:1.5},
        ...(targetTotal>0?[{label:'Objectif final',data:years.map(()=>targetTotal),borderColor:muted,borderDash:[6,4],fill:false,pointRadius:0,borderWidth:1.5}]:[]),
        ...(crossYear>=0?[{label:'Objectif atteint',data:crossData,borderColor:'#43d39a',backgroundColor:'#43d39a',pointRadius:7,pointHoverRadius:9,showLine:false,pointStyle:'star'}]:[])
      ]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:true,labels:{color:muted,boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fE0(ctx.parsed.y)}`}}},
        scales:{x:{grid:{display:false},ticks:{color:muted,maxTicksLimit:11}},y:{grid:{color:grid},ticks:{color:muted,callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v}}}
      }
    }));
  }
}

function renderSnapshotManager(){
  const snaps=[...(S.snapshots||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!snaps.length)return`<div class="card"><div class="card-title">Snapshots</div><p class="muted">Aucun snapshot enregistré.</p></div>`;
  const totalSize=JSON.stringify(snaps).length;
  const rows=snaps.map((s,i)=>{
    const d=new Date(s.date);
    const dateStr=d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
    const timeStr=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const tag=s.manual?'<span class="badge b-live" style="font-size:10px">manuel</span>':'<span class="badge b-manual" style="font-size:10px">auto</span>';
    const total=s.total!=null?fE(s.total):'—';
    const invested=s.invested!=null?fE(s.invested):'—';
    const latent=s.unrealized!=null?`<span class="${(s.unrealized||0)>=0?'pos':'neg'}">${fE(s.unrealized)}</span>`:'—';
    return`<tr>
      <td class="l">${dateStr} <span class="muted" style="font-size:11px">${timeStr}</span></td>
      <td class="l">${tag}</td>
      <td>${total}</td>
      <td>${invested}</td>
      <td>${latent}</td>
      <td><button class="icon-btn" style="color:var(--red)" onclick="deleteSnapshot('${s.id}')" title="Supprimer">×</button></td>
    </tr>`;
  }).join('');
  return`<div class="card">
    <div class="toolbar">
      <div class="card-title" style="margin:0">Snapshots (${snaps.length})</div>
      <div class="fa">
        <span class="muted" style="font-size:12px">${(totalSize/1024).toFixed(1)} Ko · max 600</span>
        <button class="btn btn-g" onclick="createSnapshot(true);renderSettings()">Créer maintenant</button>
        <button class="btn btn-d" onclick="if(confirm('Vider tous les snapshots ?')){S.snapshots=[];save();renderSettings()}">Tout vider</button>
        <button class="btn btn-g" onclick="exportSnapshots()">Exporter JSON</button>
      </div>
    </div>
    <div class="note" style="margin-bottom:12px">Un snapshot par jour (auto au démarrage + manuel). Le capital investi est recalculé depuis tes transactions — seule la valeur totale du patrimoine est stockée ici.</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th class="l">Date</th><th class="l">Type</th><th>Patrimoine total</th><th>Capital injecté</th><th>Latent</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}
function deleteSnapshot(id){if(!confirm('Supprimer ce snapshot ?'))return;S.snapshots=(S.snapshots||[]).filter(s=>s.id!==id);save();renderSettings();}
function exportSnapshots(){const payload={meta:{app:'Tracker Patrimoine',exportedAt:new Date().toISOString(),count:(S.snapshots||[]).length},snapshots:S.snapshots||[]};download(`snapshots_${today()}.json`,JSON.stringify(payload,null,2),'application/json');toast('Snapshots exportés');}

function exportBackup(){const payload={meta:{app:'Tracker Patrimoine',schemaVersion:6,exportedAt:new Date().toISOString()},data:S};download(`patrimoine_backup_${today()}.json`,JSON.stringify(payload,null,2),'application/json');toast('Backup téléchargé');}
function validateBackup(raw){const data=raw?.data||raw;if(!data||typeof data!=='object')return null;if(!Array.isArray(data.transactions)&&!Array.isArray(data.accounts)&&!Array.isArray(data.snapshots))return null;return migrate(data);}
function importBackupFile(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(reader.result),next=validateBackup(parsed);if(!next){toast('Backup invalide');return;}if(!confirm('Restaurer ce backup ? Les données actuelles seront remplacées.'))return;S=next;save();applyTheme();renderSpotBar();renderCurrent();toast('Backup restauré');}catch(e){toast('Fichier JSON invalide');}finally{byId('backup-file').value='';}};reader.readAsText(file);}
function exportCSV(){const txCols=['date','name','sym','type','op','qty','price','fees','fxFees','spreadFees','cur','platform','envelope','realizedPl'];const txRows=[txCols.join(','),...S.transactions.map(t=>txCols.map(c=>csv(t[c]??'')).join(','))];const accCols=['name','type','envelope','cur','amount','institution','updatedAt','comment'];const accRows=['',accCols.join(','),...S.accounts.map(a=>accCols.map(c=>csv(a[c]??'')).join(','))];download(`patrimoine_${today()}.csv`,[...txRows,...accRows].join('\n'),'text/csv');toast('CSV téléchargé');}
function csv(v){return`"${String(v).replace(/"/g,'""')}"`}
function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function resetData(){if(!confirm('Effacer toutes les données et revenir aux données par défaut ?'))return;S=DEF();save();applyTheme();renderSpotBar();renderCurrent();toast('Réinitialisé');}
function toast(msg){const el=byId('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function updateOnline(){byId('odot').style.background=navigator.onLine?'var(--green)':'var(--red)'}
function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme||'dark');byId('theme-label').textContent=(S.theme||'dark')==='dark'?'Mode clair':'Mode sombre'}
window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);
applyTheme();updateOnline();byId('refresh-meta').textContent=`Dernier refresh : ${ago(S.lastRefresh)} · auto 4h`;renderSpotBar();if(!(S.snapshots||[]).length){createSnapshot(false)}renderDashboard();
// Chargement live initial (crypto + or) au démarrage, sans bloquer l'affichage
async function fetchRwaPrices(symbols){
  // Récupère les prix tokenisés (actions/ETF) via CoinGecko, en USD, convertit en EUR
  const ids=[],map={};
  (symbols||Object.keys(RWA)).forEach(s=>{const id=RWA[s];if(id){ids.push(id);map[id]=s;}});
  if(!ids.length)return {};
  const out={};
  try{
    // CoinGecko limite l'URL : on découpe par lots de 30
    for(let i=0;i<ids.length;i+=30){
      const batch=ids.slice(i,i+30);
      const j=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${batch.join(',')}&vs_currencies=usd&include_24hr_change=true`).then(r=>r.json());
      const now=new Date().toISOString();
      batch.forEach(id=>{
        if(j?.[id]?.usd){
          const sym=map[id];
          const usd=j[id].usd;
          const eur=usd*(S.fx.USD||0.92); // USD→EUR
          // On stocke TOUJOURS en EUR pour l'affichage uniforme
          S.prices[sym.toLowerCase()]={price:eur,cur:'EUR',src:'live',at:now};
          out[sym]={price:eur,cur:'EUR',change:j[id].usd_24h_change};
        }
      });
      if(i+30<ids.length)await new Promise(r=>setTimeout(r,1500));
    }
    save();renderSpotBar();
  }catch(e){console.warn('RWA fetch error',e);}
  return out;
}
async function fetchFx(){
  const now=new Date().toISOString();
  // CoinGecko : on demande BTC en EUR + USD + CHF simultanement
  // EUR/USD = btc_eur / btc_usd, EUR/CHF = btc_eur / btc_chf
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur,usd,chf',{signal:AbortSignal.timeout(8000)});
    const j=await r.json();
    const eur=j?.bitcoin?.eur,usd=j?.bitcoin?.usd,chf=j?.bitcoin?.chf;
    if(eur&&usd&&chf){
      S.fx.USD=eur/usd;   // 1 USD = x EUR
      S.fx.CHF=eur/chf;   // 1 CHF = x EUR
      S.fxUpdated=now;
      save();renderSpotBar();renderCurrent();
      return true;
    }
  }catch(e){}
  return false;
}
(async function initLivePrices(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,pax-gold&vs_currencies=eur');
    const j=await r.json();
    const now=new Date().toISOString();
    if(j?.bitcoin?.eur)S.prices.btc={price:j.bitcoin.eur,cur:'EUR',src:'live',at:now};
    if(j?.ethereum?.eur)S.prices.eth={price:j.ethereum.eur,cur:'EUR',src:'live',at:now};
    if(j?.solana?.eur)S.prices.sol={price:j.solana.eur,cur:'EUR',src:'live',at:now};
    if(j?.['pax-gold']?.eur){S.prices.xau={price:j['pax-gold'].eur,cur:'EUR',src:'live',at:now};S.goldSpot=j['pax-gold'].eur;S.goldUpdated=now;}
    save();renderSpotBar();
  }catch(e){}
  // Taux de change avec fallbacks
  await fetchFx();
})();
if(!liveNetworkAllowed())byId('refresh-meta').textContent='Mode fichier local · live web coupe';
</script>
