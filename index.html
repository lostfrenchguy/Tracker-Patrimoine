<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tracker Patrimoine</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0b0e;--bg2:#0d0f14;--surface:#131520;--surface2:#181b27;--surface3:#1d2130;--border:#242833;--text:#eceef4;--muted:#8b93a4;--green:#43d39a;--red:#f0676a;--blue:#4f9dde;--gold:#e8c56a;--orange:#e0a458;--violet:#9b8cff;--accent:#cdb78a;--accent-soft:rgba(205,183,138,.13);--shadow:0 18px 45px rgba(0,0,0,.28)}
[data-theme="light"]{--bg:#f4f4f0;--bg2:#fff;--surface:#fff;--surface2:#faf9f6;--surface3:#f1f0ea;--border:#e4e3db;--text:#1a1c20;--muted:#71757e;--green:#16a34a;--red:#dc2626;--blue:#2563eb;--gold:#b58516;--orange:#b76b24;--violet:#6d5bd0;--accent:#8a6d3b;--accent-soft:rgba(138,109,59,.11);--shadow:0 18px 45px rgba(20,22,28,.08)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px}
::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
button,input,select,textarea{font-family:inherit}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;width:100%}
textarea{min-height:38px;resize:vertical}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select{appearance:none;cursor:pointer}
.shell{display:flex;min-height:100vh}
.sidebar{width:232px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;padding:0 8px 22px}
.brand-mark{width:32px;height:32px;border-radius:8px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
.brand-name{font-family:'Newsreader',serif;font-size:17px;font-weight:500}
.brand-sub{font-size:11px;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:3px;flex:1}
.nb{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-size:13.5px;font-weight:500;cursor:pointer;text-align:left;transition:.15s}
.nb:hover{background:var(--surface2);color:var(--text)}.nb.on{background:var(--accent-soft);color:var(--accent)}
.nb svg{flex-shrink:0;opacity:.85}.nb.on svg{opacity:1}
.sidebar-foot{border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:18px 26px;border-bottom:1px solid var(--border)}
.page-title{font-family:'Newsreader',serif;font-size:23px;font-weight:500;letter-spacing:-.02em}
.refresh-meta{font-size:11.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px}
.odot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.spotbar{display:flex;align-items:center;border-bottom:1px solid var(--border);background:var(--bg2);overflow-x:auto;padding:0 26px}
.spot-item{display:flex;align-items:center;gap:8px;padding:8px 16px;border-right:1px solid var(--border);white-space:nowrap}
.spot-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.spot-price{font-size:13px;font-weight:700}.spot-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}.spot-dot.live{background:var(--green);box-shadow:0 0 7px var(--green)}
.spot-hint{font-size:10px;color:var(--muted);padding-left:14px;white-space:nowrap}
.content{padding:22px 26px;flex:1}
.stack{display:flex;flex-direction:column;gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:18px;box-shadow:none}
.card.flush{padding:0}
.card-title{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.section-title{font-family:'Newsreader',serif;font-size:18px;font-weight:500;margin:4px 0 12px;letter-spacing:-.01em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
.hero{background:linear-gradient(150deg,var(--surface),var(--surface2))}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px}
.hero-label{font-size:12px;color:var(--muted);margin-bottom:4px}.hero-val{font-family:'Newsreader',serif;font-size:38px;font-weight:500;letter-spacing:-.025em}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;font-size:13px;font-weight:700;margin-top:10px}
.pill.up{background:rgba(67,211,154,.15);color:var(--green)}.pill.dn{background:rgba(240,103,106,.15);color:var(--red)}.pill.neutral{background:var(--surface3);color:var(--muted)}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap}.hs-item{display:flex;flex-direction:column;gap:3px}.hs-lbl{font-size:11px;color:var(--muted)}.hs-val{font-size:16px;font-weight:700}
.chart-wrap{margin-top:14px;position:relative;height:240px}.chart-wrap.small{height:150px}.chart-empty{height:150px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;border:1px dashed var(--border);border-radius:8px;background:var(--surface2)}
.period-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.pchip{padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.15s}.pchip:hover{color:var(--text)}.pchip.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.alloc-wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}.donut-wrap{width:155px;height:155px;flex-shrink:0}.legend{flex:1;min-width:130px;display:flex;flex-direction:column;gap:7px}.leg-row{display:grid;grid-template-columns:10px 1fr auto;gap:8px;align-items:center;font-size:13px}.leg-dot{width:10px;height:10px;border-radius:3px}
.tbl-wrap{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{padding:11px 13px;text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;white-space:nowrap}th.l{text-align:left}td{padding:11px 13px;text-align:right;border-top:1px solid var(--border);vertical-align:middle}td.l{text-align:left}tr:hover td{background:var(--surface2)}
.asset-name{font-weight:700}.asset-sub{font-size:11px;color:var(--muted);margin-top:2px}.src-tag{font-size:9px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:2px}.sub-pct{font-size:11px}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
.b-gold{background:rgba(232,197,106,.2);color:var(--gold)}.b-crypto{background:rgba(79,157,222,.2);color:var(--blue)}.b-etf{background:rgba(155,140,255,.2);color:var(--violet)}.b-stock{background:rgba(224,164,88,.2);color:var(--orange)}.b-cash,.b-account{background:rgba(125,134,148,.22);color:#aeb6c5}.b-live{background:rgba(67,211,154,.18);color:var(--green)}.b-manual{background:rgba(224,164,88,.18);color:var(--orange)}.b-income{background:rgba(205,183,138,.2);color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-p{background:var(--accent);color:var(--bg)}.btn-p:hover{filter:brightness(1.08)}.btn-p:disabled{opacity:.55;cursor:default}.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-g:hover{color:var(--text);border-color:var(--muted)}.btn-d{background:transparent;border:1px solid var(--red);color:var(--red)}.btn-d:hover{background:rgba(240,103,106,.1)}
.icon-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:5px 6px;border-radius:6px;font-size:13px;transition:.15s;display:inline-flex;align-items:center}.icon-btn:hover{color:var(--text);background:var(--surface2)}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:12px}.fl label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}.fl.wide{grid-column:span 2}.fa,.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.toolbar{justify-content:space-between;margin-bottom:12px}
.mini-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 7px;color:var(--text);font-size:12px;outline:none}.inline-edit{display:inline-flex;align-items:center;gap:4px}.pos{color:var(--green)}.neg{color:var(--red)}.muted{color:var(--muted)}
.kpi-card{padding:16px}.kpi-lbl{font-size:11.5px;color:var(--muted);margin-bottom:6px}.kpi-val{font-family:'Newsreader',serif;font-size:24px;font-weight:500;letter-spacing:-.02em}.kpi-note{font-size:11px;color:var(--muted);margin-top:4px}
.progress{height:7px;border-radius:999px;background:var(--surface3);overflow:hidden;margin-top:8px}.progress span{display:block;height:100%;background:var(--accent);border-radius:999px}
.decision-grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:14px}
.decision-card{background:linear-gradient(145deg,var(--surface2),var(--surface));border:1px solid var(--border);border-radius:8px;padding:18px;min-height:220px}
.decision-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
.decision-label{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.06em}
.decision-title{font-family:'Newsreader',serif;font-size:28px;font-weight:500;line-height:1.05;letter-spacing:-.02em;margin-top:5px}
.decision-sub{font-size:12px;color:var(--muted);line-height:1.45;margin-top:8px;max-width:650px}
.score-badge{width:70px;height:70px;border-radius:50%;border:6px solid var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Newsreader',serif;font-size:21px;font-weight:600;background:var(--accent-soft)}
.action-list{display:flex;flex-direction:column;gap:0}
.action-item{display:grid;grid-template-columns:25px minmax(0,1fr) auto;gap:10px;align-items:start;padding:10px 0;border-top:1px solid var(--border)}
.action-icon{width:25px;height:25px;border-radius:7px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--accent)}
.action-title{font-weight:800}.action-detail{font-size:12px;color:var(--muted);line-height:1.35;margin-top:2px}
.action-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);white-space:nowrap}
.alloc-bars{display:flex;flex-direction:column;gap:9px}
.bar-row{display:grid;grid-template-columns:92px 1fr 76px;gap:9px;align-items:center;font-size:12px}
.bar-label{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{height:9px;background:var(--surface3);border-radius:999px;overflow:hidden;position:relative}
.bar-track span{display:block;height:100%;background:var(--accent);border-radius:999px}
.bar-track em{display:block;height:100%;background:rgba(79,157,222,.7);border-radius:999px;position:absolute;left:0;top:0;opacity:.55}
.bar-meta{text-align:right;color:var(--muted);font-size:11px}
.quick-band{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.quick-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.quick-card b{display:block;font-size:16px;margin-top:5px}.quick-card span{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:800;letter-spacing:.05em}
.dca-row{display:grid;grid-template-columns:34px minmax(160px,1fr) repeat(5,minmax(90px,auto));gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}.chk{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent}.chk.on{background:var(--green);border-color:var(--green);color:var(--bg)}
.alert-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;font-size:13px;border-bottom:1px solid var(--border);color:var(--orange)}.move-row{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.sources-list{display:flex;flex-direction:column;gap:10px}.src-row{display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.autocomplete-wrap{position:relative}.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--accent);border-radius:8px;z-index:50;max-height:220px;overflow-y:auto;margin-top:2px;box-shadow:var(--shadow)}.ac-item{padding:9px 12px;cursor:pointer;font-size:13px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;border-bottom:1px solid var(--border)}.ac-item:hover{background:var(--accent-soft)}.ac-name{font-weight:700}.ac-type{font-size:10px;color:var(--muted)}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}.market-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;min-height:118px}.mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}.mc-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}.mc-ticker{font-size:10px;color:var(--muted);font-weight:700}.mc-price{font-family:'Newsreader',serif;font-size:22px;font-weight:500;line-height:1.1}.mc-chg,.mc-loading,.mc-source{font-size:12px;font-weight:700;margin-top:5px}.mc-loading{color:var(--muted)}.mc-source{color:var(--muted);font-weight:600}.mc-error{color:var(--orange)}
.empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}.hint{font-size:12px;color:var(--muted);line-height:1.45}.note{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.45}.file-input{display:none}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--accent);color:var(--bg);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:800;box-shadow:var(--shadow);z-index:99;transition:.3s;opacity:0;pointer-events:none;max-width:min(92vw,560px);text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:980px){.g4{grid-template-columns:repeat(2,1fr)}.decision-grid,.quick-band{grid-template-columns:1fr}.dca-row{grid-template-columns:30px 1fr 1fr}.dca-row>*:nth-child(n+4){grid-column:auto}.hero-val{font-size:34px}}
@media(max-width:720px){.shell{flex-direction:column}.sidebar{width:100%;flex-direction:row;padding:10px 12px;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto}.brand{display:none}.nb span:last-child{display:none}.nb{padding:9px}.sidebar-foot{border:none;padding:0;margin:0}.topbar,.content{padding-left:14px;padding-right:14px}.spotbar{padding:0 10px}.hero-val{font-size:30px}.g2,.g3,.g4{grid-template-columns:1fr}.fl.wide{grid-column:span 1}.toolbar{align-items:flex-start}.chart-wrap{height:210px}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">◆</div><div><div class="brand-name">Patrimoine</div><div class="brand-sub">Cockpit long terme</div></div></div>
    <nav class="nav" id="nav">
      <button class="nb on" data-tab="dashboard"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Vue d'ensemble</span></button>
      <button class="nb" data-tab="portfolio"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg><span>Portefeuille</span></button>
      <button class="nb" data-tab="envelopes"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h18M5 7v12h14V7"/><path d="M8 7V5h8v2"/></svg><span>Enveloppes</span></button>
      <button class="nb" data-tab="transactions"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></svg><span>Transactions</span></button>
      <button class="nb" data-tab="income"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14a3.5 3.5 0 0 1 0 7H6"/></svg><span>Revenus passifs</span></button>
      <button class="nb" data-tab="market"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Marchés</span></button>
      <button class="nb" data-tab="dca"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Plan mensuel</span></button>
      <button class="nb" data-tab="allocation"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2v10l7 7"/></svg><span>Allocation cible</span></button>
      <button class="nb" data-tab="goals"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><span>Objectifs</span></button>
      <button class="nb" data-tab="settings"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Réglages</span></button>
    </nav>
    <div class="sidebar-foot"><button class="nb" id="theme-btn"><svg id="theme-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg><span id="theme-label">Mode clair</span></button></div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div><div class="page-title" id="page-title">Vue d'ensemble</div><div class="refresh-meta"><span class="odot" id="odot"></span><span id="refresh-meta">Dernier refresh : jamais · auto 4h</span></div></div>

function drawHistoryChart(){
  const el=byId('history-chart');if(!el)return;
  const {from,to}=histRange();
  const snaps=[...(S.snapshots||[])].filter(s=>{const d=new Date(s.date);if(from&&d<from)return false;if(to&&d>to)return false;return true;}).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(snaps.length<2)return;
  const dark=document.documentElement.getAttribute('data-theme')==='dark',grid=dark?'rgba(36,40,51,1)':'rgba(230,230,223,1)',muted=dark?'#888fa0':'#71757e';
  charts.push(new Chart(el.getContext('2d'),{
    type:'line',
    data:{
      labels:snaps.map(s=>new Date(s.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})),
      datasets:[
        {label:'Valeur totale',data:snaps.map(s=>s.total),borderColor:'#cdb78a',backgroundColor:'rgba(205,183,138,.12)',fill:true,tension:.35,pointRadius:2},
        {label:'Capital investi',data:snaps.map(s=>s.invested),borderColor:'#4f9dde',tension:.35,pointRadius:0},
        {label:'Plus-value totale',data:snaps.map(s=>s.performance),borderColor:'#43d39a',tension:.35,pointRadius:0}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{labels:{color:muted}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fE(c.parsed.y)}`}}},
      scales:{x:{grid:{display:false},ticks:{color:muted}},y:{grid:{color:grid},ticks:{color:muted,callback:v=>`${Math.round(v/1000)}k`}}}
    }
  }));
}

function salePreview(tx){let qty=0,cost=0;[...S.transactions].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(t=>{if((t.date||'')>(tx.date||'9999-12-31'))return;if(t.sym!==tx.sym||inferEnvelope(t)!==tx.envelope||t.platform!==tx.platform)return;const q=num(t.qty),gross=toE(q*num(t.price),t.cur),fees=toE(feeTotal(t),t.cur);if(t.op==='buy'){qty+=q;cost+=gross+fees}else if(t.op==='sell'){const sq=Math.min(q,qty);if(sq<=0)return;const avg=qty?cost/qty:0;qty-=sq;cost-=avg*sq;}});if(tx.qty>qty+1e-10)return{error:'Quantité vendue supérieure à la position disponible'};const avg=qty?cost/qty:0,proceeds=toE(tx.qty*tx.price,tx.cur)-toE(feeTotal(tx),tx.cur),realized=proceeds-avg*tx.qty;return{avgCost:avg,proceeds,realized};}

ier refresh : ${ago(now)} · auto 4h`;renderSpotBar();renderCurrent();toast(n?`${n} prix mis à jour + snapshot créé`:'Serveurs inaccessibles: prix manuels conservés');}

function executeDca(id){
  const l=S.dca.lines.find(x=>x.id===id),mk=monthNow();if(!l)return;
  const existing=(S.dca.executions||[]).find(e=>e.month===mk&&e.lineId===id);
  if(existing){
    if(!confirm('Retirer le statut exécuté de cette ligne ?'))return;
    if(existing.txId&&confirm('Retirer aussi la transaction créée automatiquement ?'))S.transactions=S.transactions.filter(t=>t.id!==existing.txId);
    S.dca.executions=S.dca.executions.filter(e=>e.id!==existing.id);
    save();renderDca();toast('Exécution DCA retirée');return;
  }
  const actual=num(prompt('Montant brut réellement investi',l.plannedAmt));if(actual<=0)return;
  let txId=null,fees=0,spreadFees=0,qty=0,price=0;

    price=priceFor(l.sym,0,l.cur);price=num(prompt('Prix unitaire exécuté',price||0));

    const tx={id:cid(),date:today(),name:l.name,sym:l.sym,type:l.type,envelope:l.envelope,platform:l.platform,cur:l.cur,op:'buy',qty,price,fees,spreadFees,comment:'Créé depuis le plan mensuel'};
    S.transactions.push(tx);txId=tx.id;
  }
  S.dca.executions=[...(S.dca.executions||[]),{id:cid(),lineId:id,month:mk,date:today(),name:l.name,planned:num(l.plannedAmt),actual,fees,spreadFees,qty,price,txId}];
  save();toast('Plan mensuel exécuté');renderDca();
}

function renderGoals(){
  const T=totals(),g=S.goals,rate=num(g.annualReturn),monthly=num(g.monthlyInvestment);
  // Projection : capital actuel + apport mensuel avec rendement
  function proj(y){const r=rate/100/12,n=y*12;return T.val*Math.pow(1+r,n)+(r?monthly*((Math.pow(1+r,n)-1)/r):monthly*n)}
  // Mensuel SUPPLÉMENTAIRE nécessaire pour atteindre target en y ans, PAR RAPPORT à la projection actuelle
  // Si proj(y) >= target => 0
  // Sinon : on cherche x tel que proj_avec_monthly+x(y) = target
  // gap = target - T.val*(1+r)^n; needed_monthly = gap*r/((1+r)^n-1); extra = needed_monthly - monthly
  function extraNeeded(target,y){
    const want=num(target),pj=proj(y);
    if(pj>=want||want<=0)return 0;
    const r=rate/100/12,n=y*12,fv=T.val*Math.pow(1+r,n);
    const gap=want-fv;
    const totalMonthly=r?gap*r/(Math.pow(1+r,n)-1):gap/n;
    return Math.max(0,totalMonthly-monthly);
  }
  const pct=num(g.targetTotal)>0?clamp(T.val/num(g.targetTotal)*100,0,100):0;
  byId('content').innerHTML=`<div class="stack">
    <div class="g4">
      <div class="card kpi-card"><div class="kpi-lbl">Mon patrimoine aujourd'hui</div><div class="kpi-val">${fE(T.val)}</div></div>
      <div class="card kpi-card">
        <div class="kpi-lbl">Objectif final</div>
        <input type="number" value="${g.targetTotal}" onchange="S.goals.targetTotal=num(this.value);save();renderGoals()">
        <div class="progress"><span style="width:${pct}%"></span></div>
        <div class="hint" style="margin-top:6px">${pct.toFixed(1)} % atteint</div>
      </div>
      <div class="card kpi-card">
        <div class="kpi-lbl">J'investis chaque mois</div>
        <input type="number" value="${monthly}" onchange="S.goals.monthlyInvestment=num(this.value);save();renderGoals()">
      </div>
      <div class="card kpi-card">
        <div class="kpi-lbl">Rendement annuel estimé (%)</div>
        <input type="number" value="${rate}" onchange="S.goals.annualReturn=num(this.value);save();renderGoals()">
      </div>
    </div>
    <div class="card">
      <div class="toolbar"><div>
        <div class="card-title" style="margin:0">Projection sur 20 ans</div>
        <div class="hint">Si tu continues à investir ${fE0(monthly)}/mois avec ${rate} %/an de rendement moyen.</div>
      </div></div>
      <div class="chart-wrap"><canvas id="goals-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Mes objectifs par échéance</div>
      <p class="hint">Saisis le montant que tu veux avoir à chaque date. L'app te dit si tu vas l'atteindre avec ton rythme actuel, et combien il faudrait ajouter par mois si non.</p>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th class="l">Échéance</th>
          <th>Ma projection</th>
          <th>Mon objectif</th>
          <th>Résultat</th>
          <th>Mensuel à ajouter</th>
        </tr></thead>
        <tbody>${[1,5,10,20].map(y=>{
          const target=num(g.horizonTargets?.[y]);
          const pj=Math.round(proj(y));
          const extra=extraNeeded(target,y);
          const ok=target>0&&pj>=target;
          const noTarget=target<=0;
          return`<tr>
            <td class="l"><b>${y} an${y>1?'s':''}</b></td>
            <td>${fE0(pj)}</td>
            <td><input class="mini-input" type="number" value="${target||''}" placeholder="Fixe un objectif" onchange="S.goals.horizonTargets=S.goals.horizonTargets||{};S.goals.horizonTargets['${y}']=num(this.value);save();renderGoals()"></td>
            <td>${noTarget?'<span class="muted">—</span>':ok?'<span class="pos">✓ objectif atteint</span>':'<span class="neg">✗ insuffisant</span>'}</td>
            <td>${noTarget||ok?'<span class="muted">0 €</span>':('<b>+'+fE0(extra)+'</b>/mois')}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>
  </div>`;
  killCharts();
  const el=byId('goals-chart');
  if(el){
    const years=[];for(let y=0;y<=20;y++)years.push(y);
    const projData=years.map(y=>Math.round(proj(y)));
    const investedData=years.map(y=>Math.round(T.val+monthly*12*y));
    const targetTotal=num(g.targetTotal);
    const dark=document.documentElement.getAttribute('data-theme')==='dark';
    const muted=dark?'#8b93a4':'#71757e',grid=dark?'rgba(255,255,255,.05)':'rgba(0,0,0,.06)';
    charts.push(new Chart(el.getContext('2d'),{
      type:'line',
      data:{labels:years.map(y=>y===0?'Auj.':(y+' an'+(y>1?'s':''))),datasets:[
        {label:'Projection (avec rendement)',data:projData,borderColor:'#cdb78a',backgroundColor:'rgba(205,183,138,.12)',fill:true,tension:.3,pointRadius:0,borderWidth:2.5},
        {label:'Capital investi (sans rendement)',data:investedData,borderColor:'#4f9dde',backgroundColor:'transparent',fill:false,tension:.3,pointRadius:0,borderWidth:1.5},
        ...(targetTotal>0?[{label:'Objectif final',data:years.map(()=>targetTotal),borderColor:muted,borderDash:[6,4],fill:false,pointRadius:0,borderWidth:1.5}]:[])

      }
    }));
  }
}

        <div class="fl"><label>1 CHF = ? €</label><input type="number" step="0.0001" value="${S.fx.CHF}" onchange="S.fx.CHF=num(this.value);S.fxUpdated=new Date().toISOString();save();renderSettings();renderSpotBar()"></div>
      </div>
      <div class="note">1 USD = ${S.fx.USD?S.fx.USD.toFixed(4):'—'} € · 1 CHF = ${S.fx.CHF?S.fx.CHF.toFixed(4):'—'} € · Or: ${S.goldSpot?fE(S.goldSpot):'—'}/oz · Mis à jour: ${S.fxUpdated?ago(S.fxUpdated):'jamais (actualiser)'}</div>
    </div>
  </div>`;
}

function exportBackup(){const payload={meta:{app:'Tracker Patrimoine',schemaVersion:6,exportedAt:new Date().toISOString()},data:S};download(`patrimoine_backup_${today()}.json`,JSON.stringify(payload,null,2),'application/json');toast('Backup téléchargé');}
function validateBackup(raw){const data=raw?.data||raw;if(!data||typeof data!=='object')return null;if(!Array.isArray(data.transactions)&&!Array.isArray(data.accounts)&&!Array.isArray(data.snapshots))return null;return migrate(data);}
function importBackupFile(file){if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(reader.result),next=validateBackup(parsed);if(!next){toast('Backup invalide');return;}if(!confirm('Restaurer ce backup ? Les données actuelles seront remplacées.'))return;S=next;save();applyTheme();renderSpotBar();renderCurrent();toast('Backup restauré');}catch(e){toast('Fichier JSON invalide');}finally{byId('backup-file').value='';}};reader.readAsText(file);}
function exportCSV(){const txCols=['date','name','sym','type','op','qty','price','fees','fxFees','spreadFees','cur','platform','envelope','realizedPl'];const txRows=[txCols.join(','),...S.transactions.map(t=>txCols.map(c=>csv(t[c]??'')).join(','))];const accCols=['name','type','envelope','cur','amount','institution','updatedAt','comment'];const accRows=['',accCols.join(','),...S.accounts.map(a=>accCols.map(c=>csv(a[c]??'')).join(','))];download(`patrimoine_${today()}.csv`,[...txRows,...accRows].join('\n'),'text/csv');toast('CSV téléchargé');}
function csv(v){return`"${String(v).replace(/"/g,'""')}"`}
function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function resetData(){if(!confirm('Effacer toutes les données et revenir aux données par défaut ?'))return;S=DEF();save();applyTheme();renderSpotBar();renderCurrent();toast('Réinitialisé');}
function toast(msg){const el=byId('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function updateOnline(){byId('odot').style.background=navigator.onLine?'var(--green)':'var(--red)'}
function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme||'dark');byId('theme-label').textContent=(S.theme||'dark')==='dark'?'Mode clair':'Mode sombre'}
window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);
applyTheme();updateOnline();byId('refresh-meta').textContent=`Dernier refresh : ${ago(S.lastRefresh)} · auto 4h`;renderSpotBar();if(!(S.snapshots||[]).length){createSnapshot(false)}renderDashboard();
// Chargement live initial (crypto + or) au démarrage, sans bloquer l'affichage
async function fetchFx(){
  const now=new Date().toISOString();
  // CoinGecko : on demande BTC en EUR + USD + CHF simultanement
  // EUR/USD = btc_eur / btc_usd, EUR/CHF = btc_eur / btc_chf
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=eur,usd,chf',{signal:AbortSignal.timeout(8000)});
    const j=await r.json();
    const eur=j?.bitcoin?.eur,usd=j?.bitcoin?.usd,chf=j?.bitcoin?.chf;
    if(eur&&usd&&chf){
      S.fx.USD=eur/usd;   // 1 USD = x EUR
      S.fx.CHF=eur/chf;   // 1 CHF = x EUR
      S.fxUpdated=now;
      save();renderSpotBar();renderCurrent();
      return true;
    }
  }catch(e){}
  return false;
}
(async function initLivePrices(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,pax-gold&vs_currencies=eur');
    const j=await r.json();
    const now=new Date().toISOString();
    if(j?.bitcoin?.eur)S.prices.btc={price:j.bitcoin.eur,cur:'EUR',src:'live',at:now};
    if(j?.ethereum?.eur)S.prices.eth={price:j.ethereum.eur,cur:'EUR',src:'live',at:now};
    if(j?.solana?.eur)S.prices.sol={price:j.solana.eur,cur:'EUR',src:'live',at:now};
    if(j?.['pax-gold']?.eur){S.prices.xau={price:j['pax-gold'].eur,cur:'EUR',src:'live',at:now};S.goldSpot=j['pax-gold'].eur;S.goldUpdated=now;}
    save();renderSpotBar();
  }catch(e){}
  // Taux de change avec fallbacks
  await fetchFx();
})();
if(!liveNetworkAllowed())byId('refresh-meta').textContent='Mode fichier local · live web coupe';
</script>
